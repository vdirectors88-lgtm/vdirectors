<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VDIRECTORS — 신규 포트폴리오 시딩</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p  { color: #555; font-size: 14px; margin-bottom: 20px; }
    .login-form { display: flex; flex-direction: column; gap: 10px; max-width: 320px; margin-bottom: 24px; }
    .login-form input { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    button {
      padding: 10px 24px; background: #111; color: #fff;
      border: none; border-radius: 6px; font-size: 14px;
      cursor: pointer; width: fit-content;
    }
    button:disabled { background: #999; cursor: not-allowed; }
    #seedSection { display: none; }
    #loginError { color: red; font-size: 13px; }
    pre {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px;
      padding: 16px; font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all; max-height: 440px; overflow-y: auto;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>신규 포트폴리오 시딩 (14개)</h1>

  <!-- 로그인 -->
  <div id="loginSection">
    <p>Admin 계정으로 로그인 후 시딩을 실행하세요.</p>
    <div class="login-form">
      <input type="email" id="email" placeholder="이메일" />
      <input type="password" id="password" placeholder="비밀번호" />
      <button id="loginBtn">로그인</button>
      <span id="loginError"></span>
    </div>
  </div>

  <!-- 시딩 -->
  <div id="seedSection">
    <p id="userInfo"></p>
    <p>버튼을 클릭하면 신규 포트폴리오 14개를 Supabase에 자동 입력합니다.<br>
       이미지는 <code>assets/portfolio/img/pt_new_*.png</code> 경로로 저장됩니다.</p>
    <button id="seedBtn">시딩 시작</button>
    <pre id="log">결과가 여기 표시됩니다.</pre>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const NEW_ITEMS = [
      { sort_order: 25, name: '삼성증권',    category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_156.png' },
      { sort_order: 26, name: '인천도시공사', category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_157.png' },
      { sort_order: 27, name: 'HAM',         category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_163.png' },
      { sort_order: 28, name: '더그린',       category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_164.png' },
      { sort_order: 29, name: '라이프뷰티아', category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_165.png' },
      { sort_order: 30, name: 'BNI',         category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_170.png' },
      { sort_order: 31, name: '하트립',       category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_171.png' },
      { sort_order: 32, name: '다른공간',     category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_172.png' },
      { sort_order: 33, name: '렘디아',       category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_173.png' },
      { sort_order: 34, name: '남성보약',     category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_174.png' },
      { sort_order: 35, name: 'ARK',         category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_179.png' },
      { sort_order: 36, name: '자심',         category: 'design', tags: ['디자인'],   thumb_url: 'assets/portfolio/img/pt_new_180.png' },
      { sort_order: 37, name: '하림',         category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_181.png' },
      { sort_order: 38, name: '카카오뱅크',   category: 'web',    tags: ['웹사이트'], thumb_url: 'assets/portfolio/img/pt_new_182.png' },
    ];

    const logEl     = document.getElementById('log');
    const seedBtn   = document.getElementById('seedBtn');
    const loginBtn  = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    function appendLog(msg) {
      logEl.textContent += msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 로그인 체크
    window.supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) showSeedSection(session.user.email);
    });

    loginBtn.addEventListener('click', async () => {
      loginError.textContent = '';
      loginBtn.disabled = true;
      loginBtn.textContent = '로그인 중...';

      const { data, error } = await window.supabase.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (error) {
        loginError.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
        loginBtn.disabled = false;
        loginBtn.textContent = '로그인';
        return;
      }
      showSeedSection(data.user.email);
    });

    function showSeedSection(email) {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('seedSection').style.display = 'block';
      document.getElementById('userInfo').textContent = `로그인됨: ${email}`;
    }

    seedBtn.addEventListener('click', async () => {
      seedBtn.disabled = true;
      logEl.textContent = '';
      appendLog('시딩 시작...\n');

      let success = 0, fail = 0;

      for (const item of NEW_ITEMS) {
        const { error } = await window.supabase
          .from('portfolio')
          .upsert(item, { onConflict: 'sort_order' });

        if (error) {
          appendLog(`[${item.sort_order}] ${item.name} — 실패: ${error.message}`);
          fail++;
        } else {
          appendLog(`[${item.sort_order}] ${item.name} — 완료`);
          success++;
        }
      }

      appendLog(`\n완료: 성공 ${success}개 / 실패 ${fail}개`);
      seedBtn.disabled = false;
      seedBtn.textContent = '다시 실행';
    });
  </script>
</body>
</html>
