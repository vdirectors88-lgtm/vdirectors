<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>VDIRECTORS — 클라이언트 로고 시딩</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p  { color: #555; font-size: 14px; margin-bottom: 24px; }
    button {
      padding: 12px 28px; background: #111; color: #fff;
      border: none; border-radius: 6px; font-size: 15px;
      cursor: pointer; margin-bottom: 24px;
    }
    button:disabled { background: #999; cursor: not-allowed; }
    pre {
      background: #f5f5f5; border: 1px solid #ddd; border-radius: 6px;
      padding: 16px; font-size: 13px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto;
    }
  </style>
</head>
<body>
  <h1>클라이언트 로고 시딩 스크립트</h1>
  <p>버튼을 클릭하면 cl_01~cl_25 로고 25개를 Supabase clients 테이블에 자동 입력합니다.<br>
     이미 존재하는 항목은 sort_order 기준으로 upsert(중복 방지)됩니다.</p>
  <button id="seedBtn">시딩 시작</button>
  <pre id="log">결과가 여기 표시됩니다.</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script>
    const CLIENTS = Array.from({ length: 25 }, (_, i) => ({
      sort_order: i + 1,
      logo_url: `assets/portfolio/img/cl_${String(i + 1).padStart(2, '0')}.png`
    }));

    const logEl   = document.getElementById('log');
    const seedBtn = document.getElementById('seedBtn');

    function appendLog(msg) {
      logEl.textContent += msg + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    seedBtn.addEventListener('click', async () => {
      seedBtn.disabled = true;
      logEl.textContent = '';
      appendLog('시딩 시작...\n');

      let success = 0;
      let fail    = 0;

      for (const item of CLIENTS) {
        const { error } = await window.supabase
          .from('clients')
          .upsert(item, { onConflict: 'sort_order' });

        if (error) {
          appendLog(`❌ [${item.sort_order}] cl_${String(item.sort_order).padStart(2,'0')}.png — 실패: ${error.message}`);
          fail++;
        } else {
          appendLog(`✅ [${item.sort_order}] cl_${String(item.sort_order).padStart(2,'0')}.png`);
          success++;
        }
      }

      appendLog(`\n완료 — 성공 ${success}개 / 실패 ${fail}개`);
      seedBtn.disabled = false;
    });
  </script>
</body>
</html>
